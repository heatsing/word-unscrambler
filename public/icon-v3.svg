<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- W shape made of 4 diagonal rectangles simulating letter tiles -->
  <!-- Diagonal stroke W -->
  <rect x="6" y="8" width="4.5" height="3" rx="1" fill="white" opacity="0.95" transform="rotate(25 8.25 9.5)"/>
  <rect x="12" y="8" width="4.5" height="3" rx="1" fill="white" opacity="0.75" transform="rotate(-25 14.25 9.5)"/>
  <rect x="18" y="8" width="4.5" height="3" rx="1" fill="white" opacity="0.75" transform="rotate(25 20.25 9.5)"/>
  <rect x="24" y="8" width="4.5" height="3" rx="1" fill="white" opacity="0.95" transform="rotate(-25 26.25 9.5)"/>
  <!-- Middle connecting strokes -->
  <rect x="10" y="13" width="12" height="3" rx="1.5" fill="white" opacity="0.6"/>
  <!-- Small squares representing scrambled tiles -->
  <rect x="5" y="20" width="3.5" height="3.5" rx="0.8" fill="white" opacity="0.4"/>
  <rect x="10" y="20" width="3.5" height="3.5" rx="0.8" fill="white" opacity="0.7"/>
  <rect x="15" y="20" width="3.5" height="3.5" rx="0.8" fill="white" opacity="0.5"/>
  <rect x="20" y="20" width="3.5" height="3.5" rx="0.8" fill="white" opacity="0.8"/>
  <rect x="25" y="20" width="3.5" height="3.5" rx="0.8" fill="white" opacity="0.3"/>
</svg>
