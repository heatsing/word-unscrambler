version: "3.9"

services:
  web:
    image: nginx:1.27-alpine
    container_name: word-unscrambler-nginx
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_proxy_cache:/var/cache/nginx/proxy
    restart: unless-stopped

volumes:
  nginx_proxy_cache:
