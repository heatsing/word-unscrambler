# Proxy cache zone for upstream requests.
proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=proxy_cache_zone:20m max_size=500m inactive=30m use_temp_path=off;

# Rate limiting zones (per client IP).
limit_req_zone $binary_remote_addr zone=api_rate_zone:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=page_rate_zone:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit_zone:10m;

# Cache bypass conditions (manual and request-driven).
map $http_cache_control $cache_control_bypass {
  default 0;
  ~*no-cache 1;
  ~*no-store 1;
}

map $arg_nocache $query_bypass {
  default 0;
  1 1;
  true 1;
}

map $request_method $method_bypass {
  default 0;
  POST 1;
  PUT 1;
  PATCH 1;
  DELETE 1;
}

map $http_authorization $auth_bypass {
  default 1;
  "" 0;
}

map "$method_bypass$auth_bypass$cache_control_bypass$query_bypass" $skip_proxy_cache {
  default 0;
  ~1 1;
}

server {
  listen 80;
  server_name _;
  limit_req_status 429;
  limit_conn_status 429;

  root /usr/share/nginx/html;
  index index.html;

  # Friendly 429 response for throttled requests.
  error_page 429 = @rate_limited;
  location @rate_limited {
    default_type application/json;
    return 429 '{"error":"rate_limited","message":"Too many requests, please slow down."}';
  }

  # Astro static site fallback for direct route access.
  location / {
    limit_req zone=page_rate_zone burst=40 nodelay;
    limit_conn conn_limit_zone 30;
    try_files $uri $uri/ /index.html;
  }

  # Cache immutable static assets.
  location ~* \.(?:css|js|mjs|ico|gif|jpe?g|png|svg|webp|avif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  # Keep HTML fresh.
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache";
  }

  # Proxy Cache Control component:
  # - path: /proxy-cache/*
  # - upstream demo target: https://word.tips/
  # - bypass cache by adding ?nocache=1 or header Cache-Control: no-cache
  location /proxy-cache/ {
    limit_req zone=api_rate_zone burst=80 nodelay;
    limit_conn conn_limit_zone 40;

    proxy_pass https://word.tips/;
    proxy_set_header Host word.tips;
    proxy_ssl_server_name on;

    proxy_cache proxy_cache_zone;
    proxy_cache_key "$scheme$proxy_host$request_uri";
    proxy_cache_valid 200 301 302 10m;
    proxy_cache_valid 404 1m;
    proxy_cache_valid any 30s;
    proxy_cache_min_uses 1;
    proxy_cache_lock on;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;

    proxy_no_cache $skip_proxy_cache;
    proxy_cache_bypass $skip_proxy_cache;

    add_header X-Proxy-Cache $upstream_cache_status always;
    add_header X-Proxy-Cache-Key "$scheme$proxy_host$request_uri" always;
  }

  # Compression control component (gzip).
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  gzip_min_length 1024;

  # Brotli control component (optional):
  # Enable only if your Nginx build includes ngx_brotli module.
  # brotli on;
  # brotli_comp_level 5;
  # brotli_min_length 1024;
  # brotli_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
